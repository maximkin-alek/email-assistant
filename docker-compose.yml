services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: email_assistant
      POSTGRES_USER: email_assistant
      POSTGRES_PASSWORD: email_assistant
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://email_assistant:email_assistant@db:5432/email_assistant
      REDIS_URL: redis://redis:6379/0
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://email_assistant:email_assistant@db:5432/email_assistant
      REDIS_URL: redis://redis:6379/0
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
    depends_on:
      - db
      - redis

volumes:
  db_data:
